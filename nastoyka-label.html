<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>ШТОФЪ — Этикетка настойки</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
  @page { size: 90mm 62mm; margin: 0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#e9e4d8; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  body { font-family:"Lora",Georgia,serif; color:#1C1A17; }

  .label { position:relative; width:90mm; height:62mm; background:#FBFAF6; overflow:hidden; }
  .frame { position:absolute; inset:0; width:100%; height:100%; }
  .content { position:absolute; inset:0; padding:7mm 9mm 6.5mm;
             display:flex; flex-direction:column; align-items:center; text-align:center; }

  /* айдентика */
  .eyebrow { font-size:6.4pt; letter-spacing:.34em; text-transform:uppercase; color:#8C857A; padding-left:.34em; }
  .word { font-size:23pt; font-weight:700; letter-spacing:.16em; line-height:1; margin:1.1mm 0 0; padding-left:.16em; }
  .mkrow { display:flex; align-items:center; justify-content:center; gap:3mm; margin:1.6mm 0 0; }
  .mkrow .ln { width:11mm; height:0; border-top:0.3mm solid #CFC8B9; }
  .mk { height:5.2mm; width:auto; }
  .kind { font-size:7pt; letter-spacing:.28em; text-transform:uppercase; color:#8C857A; margin-top:1.6mm; padding-left:.28em; }
  .tagline { font-size:6.2pt; font-style:italic; line-height:1.5; color:#8C857A; margin-top:2.2mm; }

  /* поля под маркер */
  .fields { margin-top:auto; width:100%; }
  .fld-name { width:100%; }
  .fld-name .line { height:0; border-bottom:0.4mm solid #1C1A17; margin:0 1mm; }
  .fld-name .cap { font-size:5.8pt; letter-spacing:.2em; text-transform:uppercase; color:#8C857A; margin-top:1.2mm; }

  .fld-abv { display:flex; align-items:flex-end; justify-content:center; gap:2.6mm; margin-top:3.6mm; }
  .fld-abv .lbl { font-size:9pt; letter-spacing:.02em; }
  .fld-abv .box { width:17mm; height:0; border-bottom:0.4mm solid #1C1A17; transform:translateY(-0.4mm); }
  .fld-abv .pct { font-size:12pt; font-weight:700; }
</style></head>
<body>

  <div class="content">
    <div class="eyebrow">Ресторан · Екатерининский</div>

</div>
